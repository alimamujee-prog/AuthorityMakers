<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authority Makers</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      height: 500vh;
      background: #0a0a0a;
      -webkit-overflow-scrolling: touch;
    }

    /* ── Loader ── */
    #loader {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }
    #loader.hidden { opacity: 0; visibility: hidden; }
    .loader-bar {
      width: 120px;
      height: 2px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
    }
    .loader-bar::after {
      content: '';
      display: block;
      width: 40%;
      height: 100%;
      background: #c8a46e;
      border-radius: 2px;
      animation: load 1s ease-in-out infinite;
    }
    @keyframes load {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }

    /* ── Video ── */
    #scrollVideo {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: 0;
    }

    /* ── Logo ── */
    #logo {
      position: fixed;
      top: 40px;
      right: 40px;
      z-index: 10;
      height: 48px;
      width: auto;
    }

    /* ── Scroll indicator ── */
    #scroll-hint {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      opacity: 1;
      transition: opacity 0.6s ease;
    }
    #scroll-hint.hidden { opacity: 0; }
    #scroll-hint span {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.4);
    }
    .scroll-line {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.4), transparent);
      animation: scrollPulse 2s ease-in-out infinite;
    }
    @keyframes scrollPulse {
      0%, 100% { opacity: 1; transform: scaleY(1); }
      50% { opacity: 0.3; transform: scaleY(0.6); }
    }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      #logo { top: 24px; right: 24px; height: 36px; }
    }
  </style>
</head>
<body>

  <!-- Loader -->
  <div id="loader">
    <div class="loader-bar"></div>
  </div>

  <!-- Video -->
  <video id="scrollVideo" muted playsinline preload="auto">
    <source src="Authority Makers Animation Video.mp4" type="video/mp4">
  </video>

  <!-- Logo top-right -->
  <img id="logo" src="AM Logo black.png" alt="Authority Makers">

  <!-- Scroll hint -->
  <div id="scroll-hint">
    <span>Scroll</span>
    <div class="scroll-line"></div>
  </div>

  <script>
    const video = document.getElementById('scrollVideo');
    const scrollHint = document.getElementById('scroll-hint');
    const loader = document.getElementById('loader');
    let videoReady = false;

    // ── Prime the video for seeking (required by Safari/iOS) ──
    function primeVideo() {
      const playPromise = video.play();
      if (playPromise !== undefined) {
        playPromise.then(() => {
          video.pause();
          video.currentTime = 0;
          videoReady = true;
          loader.classList.add('hidden');
        }).catch(() => {
          videoReady = true;
          loader.classList.add('hidden');
        });
      }
    }

    video.addEventListener('loadedmetadata', primeVideo);
    if (video.readyState >= 1) primeVideo();

    // Fallback
    setTimeout(() => {
      videoReady = true;
      loader.classList.add('hidden');
    }, 4000);

    // ── Scroll handler ──
    function onScroll() {
      const scrollHeight = document.body.scrollHeight - window.innerHeight;
      const scrollY = window.scrollY;
      const scrollFraction = scrollHeight > 0 ? scrollY / scrollHeight : 0;

      // Scrub video
      if (videoReady && video.duration) {
        video.currentTime = scrollFraction * video.duration;
      }

      // Hide scroll hint
      if (scrollFraction > 0.02) {
        scrollHint.classList.add('hidden');
      } else {
        scrollHint.classList.remove('hidden');
      }
    }

    let ticking = false;
    window.addEventListener('scroll', () => {
      if (!ticking) {
        requestAnimationFrame(() => {
          onScroll();
          ticking = false;
        });
        ticking = true;
      }
    }, { passive: true });

    onScroll();
  </script>
</body>
</html>
